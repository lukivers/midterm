<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Курсы</title>
    <style>
        :root {
            --bg: #0d001a;
            --card: rgba(25, 15, 60, 0.82);
            --gold: #ffb74d;
            --gold-dark: #ff8c00;
            --text: #f0e6ff;
            --border: #4a2c8a;
            --shadow: 0 12px 40px rgba(255,183,77,0.18);
        }
        body { margin:0; padding:30px; font-family:'Segoe UI',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
        h1 { color:var(--gold); text-align:center; margin-bottom:2rem; text-shadow:0 4px 20px rgba(255,183,77,0.4); }
        .add { display:inline-block; margin:1.5rem 0; padding:0.9rem 1.8rem; background:linear-gradient(45deg,var(--gold-dark),var(--gold)); color:#0d001a; text-decoration:none; border-radius:12px; font-weight:600; box-shadow:var(--shadow); transition:all .3s; }
        .add:hover { transform:translateY(-4px); box-shadow:0 18px 50px rgba(255,183,77,0.45); }
        table { width:100%; border-collapse:separate; border-spacing:0 12px; background:var(--card); backdrop-filter:blur(12px); border-radius:16px; overflow:hidden; box-shadow:var(--shadow); }
        th { background:rgba(255,183,77,0.18); color:var(--gold); padding:16px; text-align:left; }
        td { padding:16px; background:rgba(40,30,90,0.5); }
        tr td:first-child { border-top-left-radius:10px; border-bottom-left-radius:10px; }
        tr td:last-child { border-top-right-radius:10px; border-bottom-right-radius:10px; }
        a { color:var(--gold); text-decoration:none; }
        a:hover { color:white; text-shadow:0 0 12px var(--gold); }
        .back { display:block; margin:3rem auto 0; text-align:center; color:var(--gold); font-size:1.2rem; text-decoration:none; }
    </style>
</head>
<body>
<h1>Список курсов</h1>
<a href="/courses/new" class="add">Добавить курс</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Название</th>
        <th>Кредиты</th>
        <th>Студентов</th>
        <th>Уроков</th>
        <th></th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="c : ${courses}">
        <td th:text="${c.id}"></td>
        <td th:text="${c.title}"></td>
        <td th:text="${c.credits}"></td>
        <td th:text="${#lists.size(c.students)}"></td>
        <td th:text="${#lists.size(c.lessons)}"></td>
        <td><a th:href="@{/courses/{id}/lessons/new(id=${c.id})}">+ урок</a></td>
    </tr>
    </tbody>
</table>

<a href="/" class="back">← На главную</a>
</body>
</html>
