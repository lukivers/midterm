<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Новый студент</title>
    <style>
        :root {
            --bg: #0d001a;
            --card: rgba(25, 15, 60, 0.82);
            --gold: #ffb74d;
            --gold-dark: #ff8c00;
            --text: #f0e6ff;
            --border: #4a2c8a;
            --shadow: 0 12px 40px rgba(255,183,77,0.22);
            --error: #ff5252;
        }
        body { margin:0; padding:40px 20px; background:var(--bg); color:var(--text); font-family:'Segoe UI',sans-serif; min-height:100vh; }
        .form-card { background:var(--card); backdrop-filter:blur(14px); border:1px solid var(--border); border-radius:20px; padding:3rem; max-width:520px; margin:0 auto; box-shadow:var(--shadow); }
        h1 { color:var(--gold); text-align:center; margin-bottom:2rem; text-shadow:0 4px 20px rgba(255,183,77,0.4); }
        .error-box { background:rgba(255,82,82,0.18); border:1px solid var(--error); color:#ff8a80; padding:1.2rem; border-radius:10px; margin-bottom:1.8rem; text-align:center; }
        input { width:100%; padding:14px; margin:1rem 0; border:1px solid var(--border); border-radius:10px; background:rgba(255,255,255,0.05); color:var(--text); font-size:1.1rem; }
        input:focus { outline:none; border-color:var(--gold); box-shadow:0 0 14px rgba(255,183,77,0.4); }
        button { width:100%; padding:1.3rem; margin-top:1.5rem; background:linear-gradient(45deg,var(--gold-dark),var(--gold)); border:none; color:#0d001a; font-size:1.3rem; font-weight:600; border-radius:12px; cursor:pointer; transition:all .3s; box-shadow:var(--shadow); }
        button:hover { transform:translateY(-5px); box-shadow:0 20px 55px rgba(255,183,77,0.5); }
        .back { display:block; margin-top:2.5rem; text-align:center; color:var(--gold); font-size:1.2rem; text-decoration:none; }
    </style>
</head>
<body>
<div class="form-card">
    <h1>Добавить студента</h1>

    <div th:if="${error}" class="error-box">
        <strong>Ошибка:</strong> <span th:text="${error}"></span>
    </div>

    <form th:action="@{/students}" method="post">
        <input type="text" name="firstName" placeholder="Имя" required />
        <input type="text" name="lastName" placeholder="Фамилия" required />
        <input type="email" name="email" placeholder="Email" required />
        <input type="text" name="address" placeholder="Адрес" required />
        <input type="text" name="phone" placeholder="Телефон" required />
        <input type="date" name="birthDate" required />
        <button type="submit">Добавить</button>
    </form>

    <a href="/students" class="back">← Назад</a>
</div>
</body>
</html>
