<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Университет — Управление</title>
    <style>
        :root {
            --bg-dark: #0d001a;
            --bg-gradient: linear-gradient(135deg, #0d001a, #1a0033, #2a004d);
            --card: rgba(25, 15, 60, 0.82);
            --accent-gold: #ffb74d;
            --accent-gold-dark: #ff8c00;
            --text-light: #f0e6ff;
            --border-soft: #4a2c8a;
            --shadow-glow: 0 12px 40px rgba(255, 183, 77, 0.22);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .welcome-card {
            background: var(--card);
            backdrop-filter: blur(14px);
            border: 1px solid var(--border-soft);
            border-radius: 24px;
            padding: 4rem 3rem;
            max-width: 620px;
            text-align: center;
            box-shadow: var(--shadow-glow);
            animation: fadeIn 1.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.4rem;
            margin-bottom: 2.5rem;
            background: linear-gradient(90deg, #ffb74d, #ff8c00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 4px 20px rgba(255, 183, 77, 0.4);
        }

        .btn {
            display: block;
            margin: 1.4rem auto;
            padding: 1.2rem 2.5rem;
            background: linear-gradient(45deg, var(--accent-gold-dark), var(--accent-gold));
            color: #0d001a;
            font-size: 1.3rem;
            font-weight: 600;
            text-decoration: none;
            border-radius: 14px;
            transition: all 0.35s;
            box-shadow: 0 8px 25px rgba(255, 183, 77, 0.35);
        }

        .btn:hover {
            transform: translateY(-6px) scale(1.04);
            box-shadow: 0 16px 45px rgba(255, 183, 77, 0.55);
        }
    </style>
</head>
<body>
<div class="welcome-card">
    <h1>Добро пожаловать в систему университета</h1>
    <a href="/students" class="btn">Управление студентами</a>
    <a href="/courses" class="btn">Управление курсами</a>
    <a href="/assign" class="btn">Назначить студента на курс</a>
</div>
</body>
</html>
